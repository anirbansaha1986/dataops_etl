name: ETL Pipeline

on:
  push:
    branches: ["main"]

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run ETL
        run: python main.py

      - name: Upload Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: etl-log
          path: etl_log.json

      - name: Trigger Agent Repo
        if: failure()
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/suparnamitra/dataops-agentic/dispatches \
          -d '{"event_type":"etl_failure","client_payload":{"run_id":"${{ github.run_id }}"}}'